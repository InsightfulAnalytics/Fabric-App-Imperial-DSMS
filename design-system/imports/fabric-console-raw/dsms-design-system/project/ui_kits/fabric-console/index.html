<!--
  Self-contained build of the Fabric Console. The component primitives below are
  inlined from components/** (source of truth) and the screen modules from the
  sibling *.jsx files so this kit renders standalone in any viewer. In a
  design-system-tab context the published namespace (window.DSMSDesignSystem_197d77)
  and _ds_bundle.js take precedence — the inline definitions are guarded with ||.
-->
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">



function toPascal(name) {
  return String(name)
    .split(/[-_]/)
    .filter(Boolean)
    .map((s) => s.charAt(0).toUpperCase() + s.slice(1))
    .join("");
}


function camelAttrs(attrs) {
  const out = {};
  for (const k in attrs) {
    const ck = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    out[ck] = attrs[k];
  }
  return out;
}


function Icon({ name = "circle", size = 16, strokeWidth = 1.75, style = {}, className }) {
  const lucide = typeof window !== "undefined" ? window.lucide : null;
  const pascal = toPascal(name);
  let nodes = null;
  if (lucide) {
    const def = (lucide.icons && lucide.icons[pascal]) || lucide[pascal];
    // def may be the children array, or [tag, attrs, children]
    if (Array.isArray(def)) {
      nodes = Array.isArray(def[0]) ? def : def[2];
    }
  }

  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      role="img"
      aria-label={name}
      className={className}
      style={{ flex: "0 0 auto", display: "inline-block", ...style }}
    >
      {nodes &&
        nodes.map(([tag, attrs], i) => React.createElement(tag, { key: i, ...camelAttrs(attrs || {}) }))}
    </svg>
  );
}




function DeltaIndicator({
  value = 0,            // e.g. 0.064 for +6.4% (fraction) or a raw number
  format = "percent",   // "percent" | "number" | "none"
  invert = false,
  size = "md",          // "sm" | "md"
  showArrow = true,
  style = {},
}) {
  const up = value >= 0;
  const good = invert ? !up : up;
  const color = value === 0 ? "var(--ds-text-muted)" : good ? "var(--ds-signal-positive)" : "var(--ds-signal-negative)";

  let text;
  if (format === "percent") {
    text = `${up ? "+" : "−"}${Math.abs(value * 100).toFixed(1)}%`;
  } else if (format === "number") {
    text = `${up ? "+" : "−"}${Math.abs(value).toLocaleString()}`;
  } else {
    text = `${up ? "+" : "−"}${Math.abs(value)}`;
  }

  const fs = size === "sm" ? 11 : size === "lg" ? 15 : 12.5;
  const is = size === "sm" ? 12 : size === "lg" ? 17 : 14;

  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 3,
        color,
        fontFamily: "var(--ds-font-mono)",
        fontVariantNumeric: "tabular-nums",
        fontSize: fs,
        fontWeight: 600,
        letterSpacing: "-0.01em",
        ...style,
      }}
    >
      {showArrow && <Icon name={up ? "arrow-up-right" : "arrow-down-right"} size={is} strokeWidth={2.25} />}
      {text}
    </span>
  );
}




function Sparkline({
  data = [],            // array of numbers, chronological
  width = 200,
  height = 48,
  color = "var(--ds-signal-info)",
  fillOpacity = 0.16,
  strokeWidth = 1.5,
  showDots = true,
  showEndLabel = false,
  endLabel,             // string override for the end label
  zero = false,         // baseline at 0 vs auto-range
  style = {},
}) {
  const padX = 3;
  const padY = 5;
  const rightPad = showEndLabel ? 40 : padX;
  const n = data.length;

  if (n < 2) {
    return <svg width={width} height={height} style={style} />;
  }

  const min = zero ? 0 : Math.min(...data);
  const max = Math.max(...data);
  const span = max - min || 1;
  const innerW = width - padX - rightPad;
  const innerH = height - padY * 2;

  const x = (i) => padX + (i / (n - 1)) * innerW;
  const y = (v) => padY + (1 - (v - min) / span) * innerH;

  const linePath = data.map((v, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(2)},${y(v).toFixed(2)}`).join(" ");
  const areaPath = `${linePath} L${x(n - 1).toFixed(2)},${(height - padY).toFixed(2)} L${x(0).toFixed(2)},${(height - padY).toFixed(2)} Z`;

  const maxIdx = data.indexOf(max);
  const minIdx = data.indexOf(min);
  const lastVal = data[n - 1];

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: "block", overflow: "visible", ...style }}>
      <path d={areaPath} fill={color} fillOpacity={fillOpacity} stroke="none" />
      <path d={linePath} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinejoin="round" strokeLinecap="round" />
      {showDots && (
        <>
          <circle cx={x(maxIdx)} cy={y(max)} r={2.6} fill="var(--ds-signal-positive)" stroke="var(--ds-bg-hull)" strokeWidth={1} />
          <circle cx={x(minIdx)} cy={y(min)} r={2.6} fill="var(--ds-signal-negative)" stroke="var(--ds-bg-hull)" strokeWidth={1} />
        </>
      )}
      {showEndLabel && (
        <text
          x={x(n - 1) + 6}
          y={y(lastVal)}
          dominantBaseline="middle"
          fill="var(--ds-text-secondary)"
          style={{ fontFamily: "var(--ds-font-mono)", fontSize: 10, fontWeight: 600 }}
        >
          {endLabel != null ? endLabel : Math.round(lastVal).toLocaleString()}
        </text>
      )}
    </svg>
  );
}




function pt(cx, cy, r, frac) {
  const a = Math.PI * (1 - frac); // frac 0 → 180° (left), 1 → 0° (right)
  return [cx + r * Math.cos(a), cy - r * Math.sin(a)];
}
function arc(cx, cy, r, f0, f1) {
  const [x0, y0] = pt(cx, cy, r, f0);
  const [x1, y1] = pt(cx, cy, r, f1);
  const large = f1 - f0 > 0.5 ? 1 : 0;
  return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
}


function Gauge({
  value = 0.94,         // 0..1
  redBelow = 0.7,
  warnBelow = 0.85,
  label = "Coverage",
  size = 180,
  thickness = 12,
  style = {},
}) {
  const v = Math.max(0, Math.min(1, value));
  const pad = thickness / 2 + 3;           // headroom so stroke + round caps never clip
  const cx = size / 2;
  const r = size / 2 - thickness / 2 - pad;
  const cy = pad + r + thickness / 2;
  const height = cy + thickness / 2 + pad;

  const color =
    v < redBelow ? "var(--ds-signal-negative)" : v < warnBelow ? "var(--ds-signal-warning)" : "var(--ds-signal-positive)";

  return (
    <div style={{ display: "inline-flex", flexDirection: "column", alignItems: "center", ...style }}>
      <svg width={size} height={height} viewBox={`0 0 ${size} ${height}`} style={{ display: "block", overflow: "visible" }}>
        <path d={arc(cx, cy, r, 0, 1)} fill="none" stroke="var(--ds-bg-deck)" strokeWidth={thickness} strokeLinecap="round" />
        {}
        <path d={arc(cx, cy, r, Math.max(0, redBelow - 0.004), redBelow + 0.004)} fill="none" stroke="var(--ds-line-bright)" strokeWidth={thickness + 4} />
        <path d={arc(cx, cy, r, 0, v || 0.0001)} fill="none" stroke={color} strokeWidth={thickness} strokeLinecap="round" />
        <text x={cx} y={cy - 4} textAnchor="middle" fill="var(--ds-text-primary)" style={{ fontFamily: "var(--ds-font-mono)", fontSize: size * 0.22, fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
          {Math.round(v * 100)}%
        </text>
      </svg>
      <div style={{ fontFamily: "var(--ds-font-display)", fontSize: 11, fontWeight: 600, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ds-text-muted)", marginTop: -2 }}>
        {label}
      </div>
    </div>
  );
}




function StatusPill({
  children,
  status = "neutral",   // "positive" | "negative" | "warning" | "info" | "neutral"
  variant = "soft",     // "soft" | "solid" | "outline"
  dot = true,
  size = "md",          // "sm" | "md"
  style = {},
}) {
  const map = {
    positive: { fg: "var(--ds-signal-positive)", dim: "var(--ds-signal-positive-dim)" },
    negative: { fg: "var(--ds-signal-negative)", dim: "var(--ds-signal-negative-dim)" },
    warning:  { fg: "var(--ds-signal-warning)",  dim: "var(--ds-signal-warning-dim)" },
    info:     { fg: "var(--ds-signal-info)",      dim: "var(--ds-signal-info-dim)" },
    neutral:  { fg: "var(--ds-text-secondary)",   dim: "var(--ds-bg-bay)" },
  };
  const c = map[status] || map.neutral;
  const s = size === "sm" ? { h: 18, px: 6, fs: 10, gap: 4, d: 5 } : { h: 22, px: 8, fs: 11, gap: 5, d: 6 };

  let bg = c.dim;
  let fg = c.fg;
  let border = "transparent";
  if (variant === "solid") {
    bg = c.fg;
    fg = status === "warning" ? "#1A1206" : "var(--ds-text-on-accent)";
  } else if (variant === "outline") {
    bg = "transparent";
    border = "color-mix(in srgb, " + "currentColor 40%, transparent)";
  }

  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: s.gap,
        height: s.h,
        padding: `0 ${s.px}px`,
        background: bg,
        color: fg,
        border: variant === "outline" ? `1px solid ${c.fg}` : `1px solid ${border}`,
        borderRadius: "var(--ds-radius-xs)",
        fontFamily: "var(--ds-font-display)",
        fontSize: s.fs,
        fontWeight: 600,
        letterSpacing: "0.08em",
        textTransform: "uppercase",
        whiteSpace: "nowrap",
        ...style,
      }}
    >
      {dot && (
        <span
          style={{
            width: s.d,
            height: s.d,
            borderRadius: "999px",
            background: variant === "solid" ? fg : c.fg,
            flex: "0 0 auto",
          }}
        />
      )}
      {children}
    </span>
  );
}




function KpiTile({
  label,
  value,                // preformatted string, e.g. "₡ 1.28B"
  unit,                 // optional small unit suffix
  delta,                // number, e.g. 0.064 (fraction) — omit to hide
  deltaLabel = "YoY",
  deltaFormat = "percent",
  invertDelta = false,
  sparkData,            // array of numbers — omit to hide
  sparkColor = "var(--ds-signal-info)",
  accent = false,       // imperial accent stripe on the left edge
  style = {},
}) {
  // Accent stripe matches the variance (delta) colour.
  const up = (delta || 0) >= 0;
  const good = invertDelta ? !up : up;
  const stripeColor =
    delta == null || delta === 0
      ? "var(--ds-accent-imperial)"
      : good
      ? "var(--ds-signal-positive)"
      : "var(--ds-signal-negative)";
  return (
    <div
      style={{
        position: "relative",
        display: "flex",
        flexDirection: "column",
        gap: 10,
        background: "var(--ds-bg-hull)",
        border: "1px solid var(--ds-line-conduit)",
        borderRadius: "var(--ds-radius-md)",
        padding: "14px 16px 14px",
        overflow: "hidden",
        ...style,
      }}
    >
      {accent && (
        <span style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 2, background: stripeColor }} />
      )}
      <div
        style={{
          fontFamily: "var(--ds-font-display)",
          fontSize: 13,
          fontWeight: 600,
          letterSpacing: "0.16em",
          textTransform: "uppercase",
          color: "var(--ds-text-secondary)",
        }}
      >
        {label}
      </div>

      <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
        <span
          style={{
            fontFamily: "var(--ds-font-mono)",
            fontVariantNumeric: "tabular-nums",
            fontSize: 30,
            fontWeight: 600,
            letterSpacing: "-0.02em",
            color: "var(--ds-text-primary)",
            lineHeight: 1,
          }}
        >
          {value}
        </span>
        {unit && (
          <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 13, color: "var(--ds-text-muted)" }}>{unit}</span>
        )}
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flex: "0 0 auto" }}>
          {delta != null && <DeltaIndicator value={delta} format={deltaFormat} invert={invertDelta} size="lg" />}
          {delta != null && (
            <span style={{ fontFamily: "var(--ds-font-body)", fontSize: 13, fontWeight: 500, color: "var(--ds-text-secondary)" }}>{deltaLabel}</span>
          )}
        </div>
        {sparkData && sparkData.length > 1 && (
          <Sparkline data={sparkData} width={180} height={36} color={sparkColor} showDots={false} style={{ flex: "0 0 50%", maxWidth: "50%" }} />
        )}
      </div>
    </div>
  );
}




function DataTable({
  columns = [], // [{ key, label, align?: "left"|"right", numeric?: bool, width?, render?: (row)=>node }]
  rows = [],
  rowKey = "id",
  dense = false,
  onRowClick,
  style = {},
}) {
  const [hover, setHover] = React.useState(-1);
  const cellPad = dense ? "6px 12px" : "9px 12px";

  return (
    <div style={{ border: "1px solid var(--ds-line-conduit)", borderRadius: "var(--ds-radius-md)", overflow: "hidden", ...style }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "var(--ds-font-body)" }}>
        <thead>
          <tr style={{ background: "var(--ds-bg-bay)" }}>
            {columns.map((c) => (
              <th
                key={c.key}
                style={{
                  textAlign: c.align || (c.numeric ? "right" : "left"),
                  padding: "8px 12px",
                  width: c.width,
                  fontFamily: "var(--ds-font-display)",
                  fontSize: 10.5,
                  fontWeight: 600,
                  letterSpacing: "0.12em",
                  textTransform: "uppercase",
                  color: "var(--ds-text-muted)",
                  borderBottom: "1px solid var(--ds-line-conduit)",
                  whiteSpace: "nowrap",
                }}
              >
                {c.label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr
              key={row[rowKey] != null ? row[rowKey] : i}
              onMouseEnter={() => setHover(i)}
              onMouseLeave={() => setHover(-1)}
              onClick={onRowClick ? () => onRowClick(row, i) : undefined}
              style={{
                background: hover === i ? "var(--ds-bg-bay)" : "transparent",
                cursor: onRowClick ? "pointer" : "default",
                transition: "background var(--ds-dur-fast) var(--ds-ease-standard)",
              }}
            >
              {columns.map((c) => (
                <td
                  key={c.key}
                  style={{
                    textAlign: c.align || (c.numeric ? "right" : "left"),
                    padding: cellPad,
                    borderBottom: i === rows.length - 1 ? "none" : "1px solid var(--ds-line-faint)",
                    fontFamily: c.numeric ? "var(--ds-font-mono)" : "var(--ds-font-body)",
                    fontVariantNumeric: c.numeric ? "tabular-nums" : "normal",
                    letterSpacing: c.numeric ? "-0.01em" : "0",
                    fontSize: 13,
                    color: c.numeric ? "var(--ds-text-primary)" : "var(--ds-text-secondary)",
                    whiteSpace: "nowrap",
                  }}
                >
                  {c.render ? c.render(row) : row[c.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}




function Button({
  children,
  variant = "secondary", // "primary" | "secondary" | "ghost" | "danger"
  size = "md",           // "sm" | "md"
  icon,                  // optional lucide name, leading
  iconTrailing,          // optional lucide name, trailing
  disabled = false,
  block = false,
  type = "button",
  onClick,
  style = {},
  ...rest
}) {
  const [hover, setHover] = React.useState(false);
  const [active, setActive] = React.useState(false);

  const sizes = {
    sm: { h: 28, px: 10, font: 12, gap: 6, icon: 14 },
    md: { h: 34, px: 14, font: 13, gap: 7, icon: 16 },
  }[size];

  const palettes = {
    primary: {
      bg: "var(--ds-accent-imperial)",
      bgHover: "var(--ds-accent-imperial-hi)",
      bgActive: "var(--ds-accent-imperial-lo)",
      fg: "var(--ds-text-on-accent)",
      border: "transparent",
    },
    danger: {
      bg: "var(--ds-accent-imperial)",
      bgHover: "var(--ds-accent-imperial-hi)",
      bgActive: "var(--ds-accent-imperial-lo)",
      fg: "var(--ds-text-on-accent)",
      border: "transparent",
    },
    secondary: {
      bg: "var(--ds-bg-bay)",
      bgHover: "var(--ds-bg-deck)",
      bgActive: "var(--ds-bg-hull)",
      fg: "var(--ds-text-primary)",
      border: "var(--ds-line-conduit)",
      borderHover: "var(--ds-line-bright)",
    },
    ghost: {
      bg: "transparent",
      bgHover: "var(--ds-bg-bay)",
      bgActive: "var(--ds-bg-hull)",
      fg: "var(--ds-text-secondary)",
      border: "transparent",
    },
  };
  const p = palettes[variant] || palettes.secondary;
  const bg = disabled ? "var(--ds-bg-hull)" : active ? p.bgActive : hover ? p.bgHover : p.bg;
  const borderColor = disabled
    ? "var(--ds-line-faint)"
    : hover && p.borderHover
    ? p.borderHover
    : p.border;

  return (
    <button
      type={type}
      disabled={disabled}
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setActive(false); }}
      onMouseDown={() => setActive(true)}
      onMouseUp={() => setActive(false)}
      style={{
        display: block ? "flex" : "inline-flex",
        width: block ? "100%" : undefined,
        alignItems: "center",
        justifyContent: "center",
        gap: sizes.gap,
        height: sizes.h,
        padding: `0 ${sizes.px}px`,
        fontFamily: "var(--ds-font-display)",
        fontSize: sizes.font,
        fontWeight: 600,
        letterSpacing: "0.06em",
        textTransform: "uppercase",
        color: disabled ? "var(--ds-text-faint)" : p.fg,
        background: bg,
        border: `1px solid ${borderColor}`,
        borderRadius: "var(--ds-radius-xs)",
        cursor: disabled ? "not-allowed" : "pointer",
        transition: "background var(--ds-dur-fast) var(--ds-ease-standard), border-color var(--ds-dur-fast) var(--ds-ease-standard)",
        whiteSpace: "nowrap",
        userSelect: "none",
        ...style,
      }}
      {...rest}
    >
      {icon && <Icon name={icon} size={sizes.icon} />}
      {children}
      {iconTrailing && <Icon name={iconTrailing} size={sizes.icon} />}
    </button>
  );
}




function IconButton({
  icon = "circle",
  size = "md",        // "sm" | "md"
  variant = "ghost",  // "ghost" | "solid"
  active = false,
  disabled = false,
  title,
  onClick,
  style = {},
  ...rest
}) {
  const [hover, setHover] = React.useState(false);
  const dim = { sm: 28, md: 34 }[size];
  const iconSize = { sm: 15, md: 17 }[size];

  let bg = "transparent";
  let fg = "var(--ds-text-secondary)";
  let border = "transparent";

  if (variant === "solid") {
    bg = "var(--ds-bg-bay)";
    border = "var(--ds-line-conduit)";
  }
  if (hover && !disabled) {
    bg = "var(--ds-bg-bay)";
    fg = "var(--ds-text-primary)";
  }
  if (active) {
    bg = "var(--ds-accent-imperial-dim)";
    fg = "var(--ds-accent-imperial-hi)";
    border = "transparent";
  }
  if (disabled) {
    fg = "var(--ds-text-faint)";
    bg = "transparent";
  }

  return (
    <button
      type="button"
      title={title}
      aria-label={title || icon}
      aria-pressed={active}
      disabled={disabled}
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: "inline-flex",
        alignItems: "center",
        justifyContent: "center",
        width: dim,
        height: dim,
        color: fg,
        background: bg,
        border: `1px solid ${border}`,
        borderRadius: "var(--ds-radius-xs)",
        cursor: disabled ? "not-allowed" : "pointer",
        transition: "background var(--ds-dur-fast) var(--ds-ease-standard), color var(--ds-dur-fast) var(--ds-ease-standard)",
        position: "relative",
        ...style,
      }}
      {...rest}
    >
      {active && (
        <span
          style={{
            position: "absolute",
            left: 0,

function Slicer({
  options = [],          // [{ value, label }] or [string]
  value,                 // controlled selected value
  defaultValue,
  size = "md",           // "sm" | "md"
  onChange,
  style = {},
  ...rest
}) {
  const norm = options.map((o) => (typeof o === "string" ? { value: o, label: o } : o));
  const isControlled = value !== undefined;
  const [internal, setInternal] = React.useState(
    defaultValue !== undefined ? defaultValue : norm[0] && norm[0].value
  );
  const selected = isControlled ? value : internal;

  const h = { sm: 28, md: 34 }[size];
  const fs = { sm: 11.5, md: 12.5 }[size];

  const select = (v) => {
    if (!isControlled) setInternal(v);
    onChange && onChange(v);
  };

  return (
    <div
      role="radiogroup"
      style={{
        display: "inline-flex",
        alignItems: "stretch",
        height: h,
        padding: 2,
        gap: 2,
        background: "var(--ds-bg-deck)",
        border: "1px solid var(--ds-line-conduit)",
        borderRadius: "var(--ds-radius-xs)",
        ...style,
      }}
      {...rest}
    >
      {norm.map((o) => {
        const on = o.value === selected;
        return <Segment key={o.value} on={on} fs={fs} label={o.label} onClick={() => select(o.value)} />;
      })}
    </div>
  );
}

function Switch({
  checked,
  defaultChecked = false,
  disabled = false,
  label,
  onChange,
  style = {},
  ...rest
}) {
  const isControlled = checked !== undefined;
  const [internal, setInternal] = React.useState(defaultChecked);
  const on = isControlled ? checked : internal;

  const toggle = () => {
    if (disabled) return;
    const next = !on;
    if (!isControlled) setInternal(next);
    onChange && onChange(next);
  };

  return (
    <label

  );
}

(function () {
  const { useState } = React;
  const AXIS = "var(--ds-text-muted)";
  const GRID = "var(--ds-line-faint)";

  
  function HBars({ data, format, color = "var(--ds-data-1)", height = 26, gap = 8 }) {
    const max = Math.max(...data.map((d) => d.value));
    return (
      <div style={{ display: "flex", flexDirection: "column", gap }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "170px 1fr 92px", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 12.5, color: "var(--ds-text-secondary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.label || d.group || d.dept || d.role}</span>
            <div style={{ height, background: "var(--ds-bg-deck)", borderRadius: 1, overflow: "hidden" }}>
              <div style={{ width: `${(d.value / max) * 100}%`, height: "100%", background: d.color || color, opacity: 0.9 }} />
            </div>
            <span style={{ fontFamily: "var(--ds-font-mono)", fontVariantNumeric: "tabular-nums", fontSize: 12.5, color: "var(--ds-text-primary)", textAlign: "right" }}>
              {format ? format(d.value) : d.value.toLocaleString()}
            </span>
          </div>
        ))}
      </div>
    );
  }

  
  function LineCompare({ series, labels, height = 230, markerIndex, markerLabel, surplus, yFormat }) {
    const [hover, setHover] = useState(-1);
    const padL = 52, padR = 16, padT = 14, padB = 26;
    const W = 760, H = height;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const all = series.flatMap((s) => s.data);
    const maxV = Math.max(...all) * 1.08;
    const n = labels.length;
    const x = (i) => padL + (i / (n - 1)) * innerW;
    const y = (v) => padT + (1 - v / maxV) * innerH;
    const ticks = 4;
    const fmtY = yFormat || ((v) => (v / 1e9).toFixed(1) + "B");

    return (
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: "block", overflow: "visible" }}
        onMouseLeave={() => setHover(-1)}>
        {Array.from({ length: ticks + 1 }).map((_, t) => {
          const v = (maxV / ticks) * t;
          return (
            <g key={t}>
              <line x1={padL} x2={W - padR} y1={y(v)} y2={y(v)} stroke={GRID} strokeWidth="1" />
              <text x={padL - 8} y={y(v) + 3} textAnchor="end" fill={AXIS} style={{ fontFamily: "var(--ds-font-mono)", fontSize: 10 }}>
                {fmtY(v)}
              </text>
            </g>
          );
        })}
        {}
        {surplus && surplus.map((v, i) => (
          <rect key={i} x={x(i) - 7} y={y(v)} width={14} height={y(0) - y(v)} fill="var(--ds-signal-positive)" opacity="0.1" />
        ))}
        {}
        {markerIndex != null && (
          <g>
            <line x1={x(markerIndex)} x2={x(markerIndex)} y1={padT} y2={H - padB} stroke="var(--ds-accent-imperial)" strokeWidth="1.5" strokeDasharray="3 3" />
            <text x={x(markerIndex) - 6} y={padT + 10} textAnchor="end" fill="var(--ds-accent-imperial-hi)" style={{ fontFamily: "var(--ds-font-display)", fontSize: 9, fontWeight: 600, letterSpacing: "0.1em" }}>
              {markerLabel}
            </text>
          </g>
        )}
        {series.map((s, si) => {
          const d = s.data.map((v, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(v)}`).join(" ");
          return <path key={si} d={d} fill="none" stroke={s.color} strokeWidth="2" strokeLinejoin="round" />;
        })}
        {labels.map((lb, i) => (
          <g key={i} onMouseEnter={() => setHover(i)}>
            <rect x={x(i) - innerW / (2 * (n - 1))} y={padT} width={innerW / (n - 1)} height={innerH} fill="transparent" />
            <text x={x(i)} y={H - 8} textAnchor="middle" fill={AXIS} style={{ fontFamily: "var(--ds-font-mono)", fontSize: 10 }}>{lb}</text>
            {hover === i && <line x1={x(i)} x2={x(i)} y1={padT} y2={H - padB} stroke="var(--ds-line-bright)" strokeWidth="1" />}
            {hover === i && series.map((s, si) => (
              <circle key={si} cx={x(i)} cy={y(s.data[i])} r="3.5" fill={s.color} stroke="var(--ds-bg-hull)" strokeWidth="1.5" />
            ))}
          </g>
        ))}
      </svg>
    );
  }

  
  function Donut({ segments, size = 168, thickness = 26, centerLabel, centerValue }) {
    const total = segments.reduce((a, s) => a + s.value, 0);
    const r = (size - thickness) / 2;
    const c = size / 2;
    const circ = 2 * Math.PI * r;
    let offset = 0;
    return (
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
          {segments.map((s, i) => {
            const frac = s.value / total;
            const dash = frac * circ;
            const el = (
              <circle key={i} cx={c} cy={c} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
                strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={-offset} />
            );
            offset += dash;
            return el;
          })}
        </svg>
        {centerValue && (
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 22, fontWeight: 600, color: "var(--ds-text-primary)", fontVariantNumeric: "tabular-nums" }}>{centerValue}</span>
            <span style={{ fontFamily: "var(--ds-font-display)", fontSize: 9, fontWeight: 600, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ds-text-muted)" }}>{centerLabel}</span>
          </div>
        )}
      </div>
    );
  }

  function Legend({ segments, format }) {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {segments.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 9, height: 9, borderRadius: 1, background: s.color, flex: "0 0 auto" }} />
            <span style={{ fontSize: 12.5, color: "var(--ds-text-secondary)", flex: 1, whiteSpace: "nowrap" }}>{s.cat || s.label}</span>
            <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 12.5, color: "var(--ds-text-primary)", fontVariantNumeric: "tabular-nums" }}>{format ? format(s.value) : s.value}</span>
          </div>
        ))}
      </div>
    );
  }

  
  function StackedBars({ rows, keys }) {
    const totals = rows.map((r) => keys.reduce((a, k) => a + (r[k.key] || 0), 0));
    const max = Math.max(...totals);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {rows.map((r, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "110px 1fr 56px", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 12.5, color: "var(--ds-text-secondary)", whiteSpace: "nowrap" }}>{r.cat}</span>
            <div style={{ display: "flex", height: 22, width: `${(totals[i] / max) * 100}%`, borderRadius: 1, overflow: "hidden", background: "var(--ds-bg-deck)" }}>
              {keys.map((k, ki) => {
                const v = r[k.key] || 0;
                return v > 0 ? <div key={ki} style={{ width: `${(v / totals[i]) * 100}%`, background: k.color }} title={`${k.label}: ${v}`} /> : null;
              })}
            </div>
            <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 12, color: "var(--ds-text-primary)", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{totals[i].toLocaleString()}</span>
          </div>
        ))}
      </div>
    );
  }

  window.DSMSCharts = { HBars, LineCompare, Donut, Legend, StackedBars };
})();

                <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 12, color: "var(--ds-text-secondary)" }}>{p.id}</span>
                <span style={{ fontSize: 13, color: "var(--ds-text-primary)" }}>{p.vendor}</span>
                <span style={{ fontFamily: "var(--ds-font-mono)", fontSize: 13, color: "var(--ds-text-primary)", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>₡ {p.amount}</span>
                <div style={{ justifySelf: "end" }}><StatusPill status={p.rs} size="sm">{p.status}</StatusPill></div>
              </div>
            ))}
          </div>
        </Panel>
      </div>
    );
  }

  window.DSMSScreens = window.DSMSScreens || {};
  window.DSMSScreens.OperationsScreen = OperationsScreen;
})();



(function () {
  const { Panel, SectionHeader, DataTable, StatusPill, KpiTile } = window.DSMSDesignSystem_197d77;
  const { StackedBars } = window.DSMSCharts;
  const D = window.DSMSData;

  const STOCK_KEYS = [
    { key: "central", label: "Central Depot", color: "var(--ds-signal-info)" },
    { key: "forward", label: "Forward Store", color: "var(--ds-signal-positive)" },
    { key: "magazine", label: "Magazine", color: "var(--ds-signal-warning)" },
    { key: "cold", label: "Cold Storage", color: "var(--ds-data-3)" },
  ];

  
  function HeatStrip() {
    const items = ["Turbolaser Coolant", "TIE Solar Array", "Reactor Plating", "Bacta Fluid", "Blaster Gas"];
    const weeks = 16;
    // deterministic pseudo pattern
    const cell = (r, c) => {
      const v = (r * 7 + c * 3) % 11;
      if (v === 0 || (r === 0 && c > 11) || (r === 4 && c > 13)) return "stockout";
      if (v < 3) return "low";
      return "ok";
    };
    const color = { stockout: "var(--ds-signal-negative)", low: "var(--ds-signal-warning)", ok: "var(--ds-bg-deck)" };
    return (
      <div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {items.map((it, r) => (
            <div key={r} style={{ display: "grid", gridTemplateColumns: "140px 1fr", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 11.5, color: "var(--ds-text-secondary)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{it}</span>
              <div style={{ display: "grid", gridTemplateColumns: `repeat(${weeks}, 1fr)`, gap: 3 }}>
                {Array.from({ length: weeks }).map((_, c) => {
                  const s = cell(r, c);
                  return <div key={c} title={`Week ${c + 1}: ${s}`} style={{ height: 16, borderRadius: 1, background: color[s], opacity: s === "ok" ? 0.6 : 0.9 }} />;
                })}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 14, paddingLeft: 150 }}>
          {[["stockout", "Stockout"], ["low", "Low"], ["ok", "In Stock"]].map(([k, l]) => (
            <span key={k} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--ds-text-muted)" }}>
              <span style={{ width: 10, height: 10, borderRadius: 1, background: color[k], opacity: k === "ok" ? 0.6 : 0.9 }} />{l}
            </span>
          ))}
        </div>
      </div>
    );
  }

  function SupplyScreen() {
    const s = D.supply;
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        <SectionHeader eyebrow="Inventory & Logistics" title="Supply Chain Status" />

        <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 14, alignItems: "stretch" }}>
          <KpiTile label="Inventory Value" value={s.inventoryValue} delta={0.052} sparkData={s.inventorySpark} sparkColor="var(--ds-signal-info)" accent style={{ justifyContent: "center" }} />
          <Panel title="Inventory by Category" eyebrow="Units by Location Type">
            <StackedBars rows={s.byCategory} keys={STOCK_KEYS} />
            <div style={{ display: "flex", gap: 16, marginTop: 14 }}>
              {STOCK_KEYS.map((k) => (
                <span key={k.key} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, color: "var(--ds-text-muted)" }}>
                  <span style={{ width: 9, height: 9, borderRadius: 1, background: k.color }} />{k.label}
                </span>
              ))}
            </div>
          </Panel>
        </div>

        <Panel title="Stockouts Heat-Strip" eyebrow="Items × Last 16 Weeks">
          <HeatStrip />
        </Panel>

        <Panel title="Reorder Watchlist" eyebrow="At or Below Reorder Point" padded={false}>
          <DataTable
            rowKey="item"
            columns={[
              { key: "item", label: "Item" },
              { key: "onHand", label: "On Hand", numeric: true },
              { key: "onOrder", label: "On Order", numeric: true },
              { key: "lead", label: "Lead (d)", numeric: true },
              { key: "days", label: "Days to Stockout", numeric: true, render: (r) => (
                <span style={{ color: r.days <= 5 ? "var(--ds-signal-negative)" : r.days <= 10 ? "var(--ds-signal-warning)" : "var(--ds-text-primary)", fontFamily: "var(--ds-font-mono)", fontVariantNumeric: "tabular-nums", fontWeight: 600 }}>{r.days}</span>
              ) },
              { key: "vendor", label: "Preferred Vendor" },
              { key: "status", label: "Status", render: (r) => <StatusPill status={r.rs} size="sm">{r.status}</StatusPill> },
            ]}
            rows={s.reorder}
          />
        </Panel>
      </div>
    );
  }

  window.DSMSScreens = window.DSMSScreens || {};
  window.DSMSScreens.SupplyScreen = SupplyScreen;
})();



(function () {
  const { Panel, SectionHeader, KpiTile, StatusPill } = window.DSMSDesignSystem_197d77;
  const { HBars, LineCompare, Donut, Legend } = window.DSMSCharts;
  const D = window.DSMSData;

  function WorkforceScreen() {
    const w = D.workforce;
    const roleData = w.byRole.map((r) => ({ label: r.role, value: r.count, color: r.combat ? "var(--ds-data-5)" : "var(--ds-data-2)" }));
    const droidSeg = [
      { cat: "Service Droids", value: w.droidShare, color: "var(--ds-data-1)" },
      { cat: "Organic Personnel", value: 1 - w.droidShare, color: "var(--ds-data-4)" },
    ];
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        <SectionHeader eyebrow="Personnel & Headcount" title="Workforce" />

        <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 14 }}>
          <KpiTile label="Total Headcount" value={w.headcount} delta={0.038} sparkData={w.headcountSpark} sparkColor="var(--ds-signal-positive)" accent style={{ justifyContent: "center" }} />
          <Panel title="Headcount by Role" eyebrow="Active Assignments">
            <HBars data={roleData} format={(n) => (n / 1000).toFixed(0) + "K"} />
            <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
              <Lg color="var(--ds-data-5)" label="Combat" />
              <Lg color="var(--ds-data-2)" label="Non-combat" />
            </div>
          </Panel>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 14 }}>
          <Panel
            title="Attrition & Combat Losses"
            eyebrow="% of Headcount · Monthly"
            actions={
              <div style={{ display: "flex", gap: 14 }}>
                <Lg color="var(--ds-signal-warning)" label="Attrition" line />
                <Lg color="var(--ds-signal-negative)" label="Combat Losses" line />
              </div>
            }
          >
            <LineCompare
              labels={D.months}
              height={210}
              markerIndex={11}
              markerLabel="BATTLE OF YAVIN"
              yFormat={(v) => v.toFixed(1) + "%"}
              series={[
                { name: "Attrition", data: w.attrition, color: "var(--ds-signal-warning)" },
                { name: "Combat Losses", data: w.combatLosses, color: "var(--ds-signal-negative)" },
              ]}
            />
          </Panel>

          <Panel title="Droids vs Organics" eyebrow="Workforce Composition">
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
              <Donut segments={droidSeg} centerValue="23.5%" centerLabel="Droids" />
              <div style={{ width: "100%" }}>
                <Legend segments={droidSeg} format={(v) => (v * 100).toFixed(1) + "%"} />
              </div>
            </div>
          </Panel>
        </div>

        <Panel title="Payroll Cost by Department" eyebrow="Trailing 12 Months">
          <HBars
            color="var(--ds-data-3)"
            format={D.fmtCredits}
            data={[
              { label: "Combat Systems", value: 1.42e9 },
              { label: "Engineering & Power", value: 0.98e9 },
              { label: "Flight Operations", value: 0.74e9 },
              { label: "Security & Detention", value: 0.41e9 },
              { label: "Habitation & Life Support", value: 0.19e9 },
            ]}
          />
        </Panel>
      </div>
    );
  }

  function Lg({ color, label, line }) {
    return (
      <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
        <span style={{ width: line ? 12 : 9, height: line ? 3 : 9, borderRadius: 1, background: color }} />
        <span style={{ fontSize: 11, color: "var(--ds-text-muted)" }}>{label}</span>
      </span>
    );
  }

  window.DSMSScreens = window.DSMSScreens || {};
  window.DSMSScreens.WorkforceScreen = WorkforceScreen;
})();



(function () {
  const { SidebarRail, TopBar, Slicer, Button, IconButton } = window.DSMSDesignSystem_197d77;
  const S = window.DSMSScreens;

  const PAGES = [
    { id: "briefing", label: "Executive Briefing", icon: "layout-dashboard", title: "Imperial Executive Briefing", crumb: ["Finance", "P&L"], Screen: () => S.BriefingScreen },
    { id: "ops", label: "Operations Command", icon: "git-branch", title: "Operations Command", crumb: ["Procurement", "Vendors"], Screen: () => S.OperationsScreen },
    { id: "supply", label: "Supply Chain", icon: "boxes", title: "Supply Chain Status", crumb: ["Logistics", "Inventory"], Screen: () => S.SupplyScreen },
    { id: "workforce", label: "Workforce", icon: "users", title: "Workforce & Personnel", crumb: ["Personnel", "Headcount"], Screen: () => S.WorkforceScreen },
    { id: "maint", label: "Maintenance", icon: "wrench", title: "Maintenance & Reliability", crumb: ["Operations", "Work Orders"] },
  ];

  function AppShell() {
    const [active, setActive] = React.useState("briefing");
    const [collapsed, setCollapsed] = React.useState(false);
    const page = PAGES.find((p) => p.id === active);
    const Screen = page.Screen ? page.Screen() : null;

    return (
      <div style={{ display: "flex", height: "100vh", width: "100%", background: "var(--ds-bg-void)", color: "var(--ds-text-secondary)", fontFamily: "var(--ds-font-body)" }}>
        <SidebarRail
          items={PAGES}
          active={active}
          onSelect={setActive}
          collapsed={collapsed}
          statusLabel="Subsidy Coverage"
          statusValue="94%"
          statusTone="positive"
        />
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          <TopBar title={page.title} breadcrumb={page.crumb} onToggleRail={() => setCollapsed((c) => !c)}>
            <Slicer size="sm" defaultValue="2022" options={[
              { value: "2019", label: "2019" },
              { value: "2020", label: "2020" },
              { value: "2021", label: "2021" },
              { value: "2022", label: "2022" },
            ]} />
            <IconButton icon="bell" title="Alerts" />
            <Button variant="secondary" size="sm" icon="download">Export</Button>
          </TopBar>

          <main style={{ flex: 1, overflow: "auto", padding: 24, backgroundColor: "var(--ds-bg-void)", backgroundImage: "var(--ds-texture-grid)", backgroundSize: "var(--ds-texture-grid-size)" }}>
            <div style={{ maxWidth: 1280, margin: "0 auto" }}>
              {Screen ? <Screen /> : <Placeholder title={page.title} />}
            </div>
          </main>
        </div>
      </div>
    );
  }

  function Placeholder({ title }) {
    return (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: 400, gap: 10, color: "var(--ds-text-muted)" }}>
        <div style={{ fontFamily: "var(--ds-font-display)", fontSize: 14, letterSpacing: "0.16em", textTransform: "uppercase" }}>{title}</div>
        <div style={{ fontSize: 12, color: "var(--ds-text-faint)" }}>Page reserved — not part of this UI-kit pass.</div>
      </div>
    );
  }

  window.DSMSApp = AppShell;
})();


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.DSMSApp));
</script>
</body>
</html>
