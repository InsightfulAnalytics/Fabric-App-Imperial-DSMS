<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — dense, technical" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-body); background: var(--ds-bg-void); padding: 20px; }
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--ds-accent-imperial-dim); border: 1px solid var(--ds-accent-imperial); border-radius: 1px; }
  .px { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-text-secondary); margin-top: 6px; }
  .tk { font-family: var(--ds-font-mono); font-size: 9px; color: var(--ds-text-faint); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="px">4</div><div class="tk">2</div></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="px">8</div><div class="tk">4</div></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="px">12</div><div class="tk">5</div></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="px">16</div><div class="tk">6</div></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="px">24</div><div class="tk">8</div></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="px">32</div><div class="tk">9</div></div>
  <div class="item"><div class="bar" style="width:48px;height:48px"></div><div class="px">48</div><div class="tk">11</div></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="px">64</div><div class="tk">12</div></div>
</div>
</body>
</html>
