<!-- @dsCard group="Colors" viewport="700x150" name="Signal" subtitle="Status colour — positive, negative, warning, info" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-body); background: var(--ds-bg-void); }
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  .chip { height: 60px; border-radius: var(--ds-radius-md); margin-bottom: 10px; display:flex; align-items:flex-end; padding:6px; }
  .dot { width: 8px; height: 8px; border-radius: 999px; }
  .name { font-size: 12px; color: var(--ds-text-primary); font-weight: 600; }
  .hex { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-text-muted); }
  .tok { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-text-faint); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div><div class="chip" style="background:var(--ds-signal-positive-dim)"><span class="dot" style="background:var(--ds-signal-positive)"></span></div><div class="name" style="color:var(--ds-signal-positive)">Positive</div><div class="hex">#3CB371</div><div class="tok">surplus · in-stock</div></div>
  <div><div class="chip" style="background:var(--ds-signal-negative-dim)"><span class="dot" style="background:var(--ds-signal-negative)"></span></div><div class="name" style="color:var(--ds-signal-negative)">Negative</div><div class="hex">#E45755</div><div class="tok">deficit · stockout</div></div>
  <div><div class="chip" style="background:var(--ds-signal-warning-dim)"><span class="dot" style="background:var(--ds-signal-warning)"></span></div><div class="name" style="color:var(--ds-signal-warning)">Warning</div><div class="hex">#FFAA00</div><div class="tok">reorder · overdue</div></div>
  <div><div class="chip" style="background:var(--ds-signal-info-dim)"><span class="dot" style="background:var(--ds-signal-info)"></span></div><div class="name" style="color:var(--ds-signal-info)">Info</div><div class="hex">#5BC8F5</div><div class="tok">schematic cyan</div></div>
</div>
</body>
</html>
