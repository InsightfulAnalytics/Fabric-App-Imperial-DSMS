<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="The hull — near-black neutral elevation steps" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-body); }
  .wrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--ds-line-conduit); padding: 16px; background-color: var(--ds-bg-void); }
  .sw { background: var(--ds-bg-void); padding: 14px; }
  .chip { height: 56px; border: 1px solid var(--ds-line-conduit); border-radius: var(--ds-radius-md); margin-bottom: 10px; }
  .name { font-size: 12px; color: var(--ds-text-primary); font-weight: 600; }
  .hex { font-family: var(--ds-font-mono); font-size: 11px; color: var(--ds-text-muted); letter-spacing: 0.02em; }
  .tok { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-text-faint); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--ds-bg-void)"></div><div class="name">Void</div><div class="hex">#0B0D10</div><div class="tok">--ds-bg-void</div></div>
  <div class="sw"><div class="chip" style="background:var(--ds-bg-hull)"></div><div class="name">Hull</div><div class="hex">#14181D</div><div class="tok">--ds-bg-hull</div></div>
  <div class="sw"><div class="chip" style="background:var(--ds-bg-bay)"></div><div class="name">Bay</div><div class="hex">#1C2128</div><div class="tok">--ds-bg-bay</div></div>
  <div class="sw"><div class="chip" style="background:var(--ds-bg-deck)"></div><div class="name">Deck</div><div class="hex">#232A33</div><div class="tok">--ds-bg-deck</div></div>
</div>
</body>
</html>
