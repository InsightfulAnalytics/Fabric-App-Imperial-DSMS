<!-- @dsCard group="Type" viewport="700x180" name="Display — Rajdhani" subtitle="Page & panel titles. Wide geometric techno-sans" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-display); background: var(--ds-bg-void); padding: 20px; }
  .r { display:flex; align-items:baseline; gap:16px; margin-bottom: 6px; color: var(--ds-text-primary); }
  .r .meta { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-text-faint); margin-left:auto; white-space:nowrap; }
  .t34 { font-size: 34px; font-weight: 700; letter-spacing: -0.01em; }
  .t26 { font-size: 26px; font-weight: 700; }
  .t20 { font-size: 20px; font-weight: 600; }
  .t16 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="r"><span class="t34">Imperial Executive Briefing</span><span class="meta">34 / 700</span></div>
  <div class="r"><span class="t26">Operations Command</span><span class="meta">26 / 700</span></div>
  <div class="r"><span class="t20">Supply Chain Status</span><span class="meta">20 / 600</span></div>
  <div class="r"><span class="t16">Reorder Watchlist</span><span class="meta">16 / 600</span></div>
</body>
</html>
