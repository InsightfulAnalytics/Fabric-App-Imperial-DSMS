<!-- @dsCard group="Type" viewport="700x180" name="Body — Inter" subtitle="UI & prose. 14px base, tight tracking" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-body); background: var(--ds-bg-void); padding: 20px; }
  .r { display:flex; align-items:baseline; gap:16px; margin-bottom: 10px; }
  .r .meta { font-family: var(--ds-font-mono); font-size: 10px; color: var(--ds-text-faint); margin-left:auto; white-space:nowrap; }
  p { margin: 0; }
  .lg { font-size: 16px; color: var(--ds-text-primary); font-weight: 500; }
  .md { font-size: 14px; color: var(--ds-text-secondary); line-height: 1.45; max-width: 480px; }
  .sm { font-size: 12px; color: var(--ds-text-muted); }
</style>
</head>
<body>
  <div class="r"><p class="lg">Subsidy coverage holding at 94% of total expenses.</p><span class="meta">16 / 500</span></div>
  <div class="r"><p class="md">Net surplus narrowed in the trailing quarter as Capital &amp; Construction outlays for the superlaser assembly accelerated ahead of schedule.</p><span class="meta">14 / 400</span></div>
  <div class="r"><p class="sm">Filed under Operations · last refreshed 0 BBY</p><span class="meta">12 / 400</span></div>
</body>
</html>
