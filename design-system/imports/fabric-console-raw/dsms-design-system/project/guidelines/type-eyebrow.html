<!-- @dsCard group="Type" viewport="700x140" name="Eyebrows & Scale" subtitle="ALL-CAPS section eyebrows and the type scale" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--ds-font-body); background: var(--ds-bg-void); padding: 20px; display:flex; gap:48px; align-items:center; }
  .eyebrow { font-family: var(--ds-font-display); font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ds-text-muted); }
  .title { font-family: var(--ds-font-display); font-size: 24px; font-weight: 700; color: var(--ds-text-primary); display:inline-block; padding-bottom: 6px; border-bottom: 1px solid var(--ds-accent-imperial); margin-top: 6px; }
  .scale { display:flex; align-items:baseline; gap: 14px; color: var(--ds-text-secondary); }
  .scale span { font-family: var(--ds-font-mono); }
  .scale .s { font-size: 10px; color: var(--ds-text-faint); }
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Financial Posture</div>
    <div class="title">Imperial Subsidy</div>
  </div>
  <div class="scale">
    <span style="font-size:11px">11</span>
    <span style="font-size:14px">14</span>
    <span style="font-size:20px">20</span>
    <span style="font-size:26px">26</span>
    <span style="font-size:34px">34</span>
  </div>
</body>
</html>
