<!-- @dsCard group="Components" viewport="700x520" name="Data Display" subtitle="KpiTile · Sparkline · Gauge · StatusPill · DeltaIndicator · DataTable" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--ds-bg-void); font-family: var(--ds-font-body); padding: 22px; }
  .glabel { font-family: var(--ds-font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ds-text-muted); margin: 0 0 12px; }
  .block { margin-bottom: 24px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { KpiTile, Sparkline, Gauge, StatusPill, DeltaIndicator, DataTable } = window.DSMSDesignSystem_197d77;
  const inc = [62,64,63,68,70,69,74,73,78,80,84,88];
  const exp = [70,72,74,73,76,80,79,83,88,90,96,99];
  const vendors = [
    { vendor: "Sienar Fleet Systems", world: "Lianna", risk: "Critical", rs: "negative", spend: "412,900,114" },
    { vendor: "Kuat Drive Yards", world: "Kuat", risk: "Elevated", rs: "warning", spend: "388,210,556" },
    { vendor: "Imperial Munitions", world: "Coruscant", risk: "Nominal", rs: "positive", spend: "201,774,300" },
  ];
  function App() {
    return (
      <div>
        <div className="block">
          <p className="glabel">KPI Tile</p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            <KpiTile label="Net Surplus" value="₡ 1.28B" delta={0.064} sparkData={inc} accent />
            <KpiTile label="Total Expenses" value="₡ 9.10B" delta={-0.021} invertDelta sparkColor="var(--ds-signal-warning)" sparkData={exp} />
            <KpiTile label="Headcount" value="1.71M" delta={0.038} sparkColor="var(--ds-signal-positive)" sparkData={inc} />
          </div>
        </div>
        <div className="block">
          <div className="row" style={{ alignItems: "flex-start", gap: 40 }}>
            <div>
              <p className="glabel">Gauge</p>
              <Gauge value={0.94} label="Subsidy Coverage" size={150} />
            </div>
            <div>
              <p className="glabel">Sparkline</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <Sparkline data={inc} width={220} height={42} showEndLabel />
                <Sparkline data={exp} width={220} height={42} color="var(--ds-signal-negative)" showEndLabel />
              </div>
            </div>
            <div>
              <p className="glabel">Delta</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <DeltaIndicator value={0.064} />
                <DeltaIndicator value={-0.021} invert />
                <DeltaIndicator value={-0.144} />
              </div>
            </div>
          </div>
        </div>
        <div className="block">
          <p className="glabel">Status Pill</p>
          <div className="row">
            <StatusPill status="positive">In Stock</StatusPill>
            <StatusPill status="warning">Reorder</StatusPill>
            <StatusPill status="negative">Stockout</StatusPill>
            <StatusPill status="negative" variant="solid">Critical</StatusPill>
            <StatusPill status="info">Pending</StatusPill>
            <StatusPill status="neutral" dot={false}>Tier III</StatusPill>
          </div>
        </div>
        <div className="block" style={{ marginBottom: 0 }}>
          <p className="glabel">Data Table</p>
          <DataTable
            rowKey="vendor"
            columns={[
              { key: "vendor", label: "Vendor" },
              { key: "world", label: "Home World" },
              { key: "risk", label: "Risk", render: (r) => <StatusPill status={r.rs} size="sm">{r.risk}</StatusPill> },
              { key: "spend", label: "Total Spend ₡", numeric: true },
            ]}
            rows={vendors}
          />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
