<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Multi-series line · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
.legend text{fill:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="card">
  <h1>Multi-series line chart</h1>
  <p class="sub">Income vs Expenses vs Net · three series</p>
  <svg id="chart" viewBox="0 0 820 440"></svg>
</div>
<script>
const months=d3.range(12).map(i=>new Date(2024,i,1));
const series=[
  {name:"Income",  color:"var(--c1)", values:months.map((d,i)=>({date:d,value:3+Math.sin(i/2)*0.5+i*0.08}))},
  {name:"Expenses",color:"var(--c5)", values:months.map((d,i)=>({date:d,value:1.8+Math.cos(i/3)*0.3+i*0.05}))},
  {name:"Net",     color:"var(--pos)",values:months.map((d,i)=>({date:d,value:1.2+Math.sin(i/2)*0.4+i*0.03}))},
];

const W=820,H=440,margin={top:24,right:24,bottom:36,left:48};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const x=d3.scaleTime().domain(d3.extent(months)).range([0,innerW]);
const y=d3.scaleLinear().domain([0,d3.max(series,s=>d3.max(s.values,d=>d.value))]).nice().range([innerH,0]);

g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(6).tickFormat(d3.timeFormat("%b")));
g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d=>"₡"+d.toFixed(0)+"T"));

const line=d3.line().x(d=>x(d.date)).y(d=>y(d.value)).curve(d3.curveMonotoneX);
g.selectAll("path.series").data(series).join("path").attr("class","series")
  .attr("fill","none").attr("stroke",d=>d.color).attr("stroke-width",2.5).attr("d",d=>line(d.values));

const legend=svg.append("g").attr("class","legend").attr("transform",`translate(${margin.left},8)`);
series.forEach((s,i)=>{
  const lx=i*90;
  legend.append("line").attr("x1",lx).attr("x2",lx+16).attr("y1",6).attr("y2",6).attr("stroke",s.color).attr("stroke-width",2.5);
  legend.append("text").attr("x",lx+22).attr("y",9).text(s.name);
});
</script>
</body>
</html>
