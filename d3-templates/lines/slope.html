<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slope chart · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.col{fill:var(--muted);font-size:12px;font-weight:600}
.lab{fill:var(--text);font-size:11px}
</style>
</head>
<body>
<div class="card">
  <h1>Slope chart</h1>
  <p class="sub">Headcount: last year &rarr; this year · change by division</p>
  <svg id="chart" viewBox="0 0 820 460"></svg>
</div>
<script>
const data=[
  {name:"Garrison",   a:1200,b:1330},
  {name:"Turbolasers",a:520, b:578},
  {name:"TIE Ops",    a:460, b:509},
  {name:"Ion Cannon", a:330, b:362},
  {name:"Superlaser", a:280, b:305},
  {name:"Detention",  a:140, b:155},
];

const W=820,H=460,margin={top:40,right:150,bottom:20,left:150};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const y=d3.scaleLinear().domain([0,d3.max(data,d=>Math.max(d.a,d.b))]).nice().range([innerH,0]);
const xL=0, xR=innerW;

svg.append("text").attr("class","col").attr("x",margin.left).attr("y",26).attr("text-anchor","middle").text("FY 1");
svg.append("text").attr("class","col").attr("x",margin.left+innerW).attr("y",26).attr("text-anchor","middle").text("FY 2");

data.forEach(d=>{
  const up=d.b>=d.a;
  g.append("line").attr("x1",xL).attr("y1",y(d.a)).attr("x2",xR).attr("y2",y(d.b))
    .attr("stroke",up?"var(--pos)":"var(--neg)").attr("stroke-width",2);
  g.append("circle").attr("cx",xL).attr("cy",y(d.a)).attr("r",3.5).attr("fill","var(--muted)");
  g.append("circle").attr("cx",xR).attr("cy",y(d.b)).attr("r",3.5).attr("fill",up?"var(--pos)":"var(--neg)");
  g.append("text").attr("class","lab").attr("x",xL-10).attr("y",y(d.a)).attr("dy","0.35em").attr("text-anchor","end").text(`${d.name} ${d.a}`);
  g.append("text").attr("class","lab").attr("x",xR+10).attr("y",y(d.b)).attr("dy","0.35em").text(`${d.b}`);
});
</script>
</body>
</html>
