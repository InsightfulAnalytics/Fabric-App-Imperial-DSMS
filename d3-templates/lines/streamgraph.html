<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Streamgraph · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
</style>
</head>
<body>
<div class="card">
  <h1>Streamgraph</h1>
  <p class="sub">Fleet composition over time · wiggle-offset stacked areas</p>
  <svg id="chart" viewBox="0 0 820 420"></svg>
</div>
<script>
const keys=["TIE Fighters","Star Destroyers","Shuttles","Walkers"];
const palette=["var(--c1)","var(--c2)","var(--c5)","var(--c3)"];
const data=d3.range(20).map(i=>({
  t:i,
  "TIE Fighters":40+Math.sin(i/2)*20+10,
  "Star Destroyers":20+Math.cos(i/3)*10+8,
  "Shuttles":15+Math.sin(i/4)*8+6,
  "Walkers":10+Math.cos(i/2)*6+5,
}));

const W=820,H=420,margin={top:16,right:24,bottom:36,left:36};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const series=d3.stack().keys(keys).offset(d3.stackOffsetWiggle).order(d3.stackOrderInsideOut)(data);
const x=d3.scaleLinear().domain(d3.extent(data,d=>d.t)).range([0,innerW]);
const y=d3.scaleLinear().domain([d3.min(series,s=>d3.min(s,d=>d[0])),d3.max(series,s=>d3.max(s,d=>d[1]))]).range([innerH,0]);
const color=d3.scaleOrdinal().domain(keys).range(palette);

g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(6).tickFormat(d=>"W"+d));

const area=d3.area().x(d=>x(d.data.t)).y0(d=>y(d[0])).y1(d=>y(d[1])).curve(d3.curveBasis);
g.selectAll("path").data(series).join("path")
  .attr("fill",d=>color(d.key)).attr("fill-opacity",0.85).attr("d",area)
  .append("title").text(d=>d.key);
</script>
</body>
</html>
