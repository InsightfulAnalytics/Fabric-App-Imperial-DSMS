<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Choropleth map · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.note{color:var(--muted);font-size:11px;margin-top:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(900px,96vw)}
svg{width:100%;height:auto;display:block}
.country{stroke:var(--bg);stroke-width:0.4}
</style>
</head>
<body>
<div class="card">
  <h1>Choropleth map</h1>
  <p class="sub">Imperial presence by region · colour encodes value</p>
  <svg id="chart" viewBox="0 0 900 460"></svg>
  <div class="note">Loads <code>world-atlas</code> TopoJSON from a CDN &mdash; requires internet.</div>
</div>
<script>
const W=900,H=460;
const svg=d3.select("#chart");
const color=d3.scaleSequential(d3.interpolateBlues).domain([0,100]);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  const countries=topojson.feature(world,world.objects.countries).features;
  const projection=d3.geoNaturalEarth1().fitSize([W,H],{type:"FeatureCollection",features:countries});
  const path=d3.geoPath(projection);
  const val=new Map(countries.map(c=>[c.id,Math.random()*100]));

  svg.append("g").selectAll("path").data(countries).join("path")
    .attr("class","country").attr("d",path)
    .attr("fill",d=>color(val.get(d.id)))
    .append("title").text(d=>`${d.properties.name}: ${Math.round(val.get(d.id))}`);
}).catch(()=>{
  svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").attr("fill","var(--muted)")
    .text("Could not load map atlas (offline).");
});
</script>
</body>
</html>
