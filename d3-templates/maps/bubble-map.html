<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bubble map · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.note{color:var(--muted);font-size:11px;margin-top:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(900px,96vw)}
svg{width:100%;height:auto;display:block}
.land{fill:#1b2330;stroke:var(--line);stroke-width:0.4}
</style>
</head>
<body>
<div class="card">
  <h1>Bubble map (proportional symbol)</h1>
  <p class="sub">Garrison strength by location · circle area encodes value</p>
  <svg id="chart" viewBox="0 0 900 460"></svg>
  <div class="note">Loads <code>world-atlas</code> TopoJSON from a CDN &mdash; requires internet.</div>
</div>
<script>
const W=900,H=460;
const svg=d3.select("#chart");
const points=d3.range(40).map(()=>({lon:Math.random()*340-170,lat:Math.random()*120-50,size:Math.random()*100+5}));
const r=d3.scaleSqrt().domain([0,100]).range([2,22]);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  const land=topojson.feature(world,world.objects.land);
  const projection=d3.geoNaturalEarth1().fitSize([W,H],land);
  const path=d3.geoPath(projection);

  svg.append("path").datum(land).attr("class","land").attr("d",path);
  svg.append("g").selectAll("circle").data(points).join("circle")
    .attr("cx",d=>projection([d.lon,d.lat])[0]).attr("cy",d=>projection([d.lon,d.lat])[1])
    .attr("r",d=>r(d.size)).attr("fill","var(--c5)").attr("fill-opacity",0.5).attr("stroke","var(--c5)");
}).catch(()=>{
  svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").attr("fill","var(--muted)")
    .text("Could not load map atlas (offline).");
});
</script>
</body>
</html>
