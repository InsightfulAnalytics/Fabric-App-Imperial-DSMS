<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Icicle · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.lab{fill:#fff;font-size:11px;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <h1>Icicle diagram</h1>
  <p class="sub">Hierarchy as nested rectangles · depth across, value down</p>
  <svg id="chart" viewBox="0 0 820 460"></svg>
</div>
<script>
const data={name:"DSMS",children:[
  {name:"Operations",children:[{name:"Garrison",value:1240},{name:"Detention",value:120},{name:"Logistics",value:340}]},
  {name:"Weapons",children:[{name:"Turbolasers",value:560},{name:"Ion Cannon",value:300},{name:"Superlaser",value:260}]},
  {name:"Flight",children:[{name:"TIE Ops",value:480},{name:"Hangar",value:210}]},
]};

const W=820,H=460;
const svg=d3.select("#chart");
const root=d3.hierarchy(data).sum(d=>d.value).sort((a,b)=>b.value-a.value);
d3.partition().size([H,W])(root); // orient horizontally: x<->height, y<->width

const color=d3.scaleOrdinal().domain(["Operations","Weapons","Flight"]).range(["var(--c2)","var(--c1)","var(--c5)"]);

const cell=svg.selectAll("g").data(root.descendants()).join("g")
  .attr("transform",d=>`translate(${d.y0},${d.x0})`);
cell.append("rect").attr("width",d=>d.y1-d.y0).attr("height",d=>d.x1-d.x0-1)
  .attr("fill",d=>{if(!d.depth)return "var(--c6)";let n=d;while(n.depth>1)n=n.parent;return color(n.data.name);})
  .attr("fill-opacity",d=>d.depth===2?0.6:0.95).attr("stroke","var(--bg)");
cell.filter(d=>(d.x1-d.x0)>14).append("text").attr("class","lab").attr("x",4).attr("y",d=>(d.x1-d.x0)/2).attr("dy","0.35em").text(d=>d.data.name);
</script>
</body>
</html>
