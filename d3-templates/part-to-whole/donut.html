<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donut chart · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(640px,96vw)}
svg{width:100%;height:auto;display:block}
.center-val{fill:var(--text);font-size:30px;font-weight:700}
.center-lab{fill:var(--muted);font-size:12px}
.legend text{fill:var(--muted);font-size:11px}
</style>
</head>
<body>
<div class="card">
  <h1>Donut chart</h1>
  <p class="sub">Expense mix with KPI in the hole · part-to-whole</p>
  <svg id="chart" viewBox="0 0 640 420"></svg>
</div>
<script>
const data=[
  {name:"Payroll",value:1240},{name:"Materiel",value:860},{name:"Upkeep",value:540},{name:"Other",value:300},
];
const palette=["var(--c2)","var(--c1)","var(--c5)","var(--c3)"];
const total=d3.sum(data,d=>d.value);

const W=640,H=420,radius=Math.min(W,H)/2-20;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${W/2},${H/2})`);
const color=d3.scaleOrdinal().domain(data.map(d=>d.name)).range(palette);
const pie=d3.pie().value(d=>d.value).sort(null);
const arc=d3.arc().innerRadius(radius*0.62).outerRadius(radius);

g.selectAll("path").data(pie(data)).join("path").attr("d",arc)
  .attr("fill",d=>color(d.data.name)).attr("stroke","var(--bg)").attr("stroke-width",2);

g.append("text").attr("class","center-val").attr("text-anchor","middle").attr("dy","-0.1em").text("₡"+(total/1000).toFixed(1)+"B");
g.append("text").attr("class","center-lab").attr("text-anchor","middle").attr("dy","1.4em").text("TOTAL EXPENSES");

const legend=svg.append("g").attr("class","legend").attr("transform",`translate(20,${H-90})`);
data.forEach((d,i)=>{legend.append("rect").attr("x",0).attr("y",i*20).attr("width",11).attr("height",11).attr("rx",2).attr("fill",palette[i]);
  legend.append("text").attr("x",16).attr("y",i*20+9).text(`${d.name} · ${Math.round(d.value/total*100)}%`);});
</script>
</body>
</html>
