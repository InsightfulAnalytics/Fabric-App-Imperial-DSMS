<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Waterfall · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
.connector{stroke:var(--muted);stroke-dasharray:2,2}
</style>
</head>
<body>
<div class="card">
  <h1>Waterfall chart</h1>
  <p class="sub">Income to net surplus · running total with +/- steps</p>
  <svg id="chart" viewBox="0 0 820 440"></svg>
</div>
<script>
const steps=[
  {name:"Income",   value:3200, type:"total"},
  {name:"Payroll",  value:-1240,type:"delta"},
  {name:"Materiel", value:-860, type:"delta"},
  {name:"Upkeep",   value:-540, type:"delta"},
  {name:"Subsidy",  value:+450, type:"delta"},
  {name:"Net",      value:null, type:"total"},
];
// compute running totals
let run=0;const bars=steps.map(s=>{
  if(s.type==="total"&&s.name==="Net"){const start=0,end=run;return {...s,start,end,value:run};}
  if(s.type==="total"){const start=0,end=s.value;run=s.value;return {...s,start,end};}
  const start=run;run+=s.value;return {...s,start,end:run};
});

const W=820,H=440,margin={top:16,right:24,bottom:46,left:56};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const x=d3.scaleBand().domain(bars.map(d=>d.name)).range([0,innerW]).padding(0.3);
const y=d3.scaleLinear().domain([0,d3.max(bars,d=>Math.max(d.start,d.end))]).nice().range([innerH,0]);

g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x));
g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d=>d+"M"));

g.selectAll("rect").data(bars).join("rect")
  .attr("x",d=>x(d.name)).attr("y",d=>y(Math.max(d.start,d.end)))
  .attr("width",x.bandwidth()).attr("height",d=>Math.abs(y(d.start)-y(d.end)))
  .attr("rx",2)
  .attr("fill",d=>d.type==="total"?"var(--c1)":(d.value>=0?"var(--pos)":"var(--neg)"));

// connectors
for(let i=0;i<bars.length-1;i++){
  g.append("line").attr("class","connector")
    .attr("x1",x(bars[i].name)+x.bandwidth()).attr("x2",x(bars[i+1].name))
    .attr("y1",y(bars[i].end)).attr("y2",y(bars[i].end));
}
</script>
</body>
</html>
