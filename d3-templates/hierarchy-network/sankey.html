<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sankey diagram · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.note{color:var(--muted);font-size:11px;margin-top:10px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.node-label{fill:var(--text);font-size:11px}
</style>
</head>
<body>
<div class="card">
  <h1>Sankey diagram</h1>
  <p class="sub">Budget flow: source &rarr; division &rarr; category · width = magnitude</p>
  <svg id="chart" viewBox="0 0 820 480"></svg>
  <div class="note">Uses the <code>d3-sankey</code> plugin (loaded via CDN).</div>
</div>
<script>
const data={
  nodes:[
    {name:"Treasury"},{name:"Subsidy"},          // 0,1 sources
    {name:"Operations"},{name:"Weapons"},{name:"Flight"}, // 2,3,4
    {name:"Payroll"},{name:"Materiel"},{name:"Upkeep"},   // 5,6,7
  ],
  links:[
    {source:0,target:2,value:1200},{source:0,target:3,value:900},{source:0,target:4,value:600},
    {source:1,target:2,value:300},{source:1,target:4,value:200},
    {source:2,target:5,value:800},{source:2,target:6,value:400},{source:2,target:7,value:300},
    {source:3,target:6,value:600},{source:3,target:7,value:300},
    {source:4,target:5,value:300},{source:4,target:6,value:300},{source:4,target:7,value:200},
  ]
};
const palette=["var(--c2)","var(--c6)","var(--c1)","var(--c1)","var(--c1)","var(--c5)","var(--c3)","var(--c4)"];

const W=820,H=480;
const svg=d3.select("#chart");
const sankey=d3.sankey().nodeWidth(14).nodePadding(14).extent([[8,8],[W-8,H-8]]);
const graph=sankey({nodes:data.nodes.map(d=>({...d})),links:data.links.map(d=>({...d}))});

svg.append("g").attr("fill","none").selectAll("path").data(graph.links).join("path")
  .attr("d",d3.sankeyLinkHorizontal())
  .attr("stroke",d=>palette[d.source.index]).attr("stroke-opacity",0.35)
  .attr("stroke-width",d=>Math.max(1,d.width));

const node=svg.append("g").selectAll("g").data(graph.nodes).join("g");
node.append("rect").attr("x",d=>d.x0).attr("y",d=>d.y0).attr("width",d=>d.x1-d.x0).attr("height",d=>d.y1-d.y0)
  .attr("fill",d=>palette[d.index]).attr("rx",2);
node.append("text").attr("class","node-label")
  .attr("x",d=>d.x0<W/2?d.x1+6:d.x0-6).attr("y",d=>(d.y0+d.y1)/2).attr("dy","0.35em")
  .attr("text-anchor",d=>d.x0<W/2?"start":"end").text(d=>d.name);
</script>
</body>
</html>
