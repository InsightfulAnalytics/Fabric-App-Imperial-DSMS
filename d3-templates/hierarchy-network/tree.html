<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tree diagram · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.node text{fill:var(--text);font-size:11px}
.link{fill:none;stroke:var(--line);stroke-width:1.5}
</style>
</head>
<body>
<div class="card">
  <h1>Tree diagram</h1>
  <p class="sub">Imperial command hierarchy · node-link tree</p>
  <svg id="chart" viewBox="0 0 820 480"></svg>
</div>
<script>
const data={name:"Emperor",children:[
  {name:"Moff Tarkin",children:[
    {name:"Ops",children:[{name:"Garrison"},{name:"Detention"}]},
    {name:"Weapons",children:[{name:"Superlaser"},{name:"Turbolasers"}]},
  ]},
  {name:"Lord Vader",children:[
    {name:"Fleet",children:[{name:"TIE Ops"},{name:"Star Destroyers"}]},
    {name:"Intel",children:[{name:"ISB"}]},
  ]},
]};

const W=820,H=480,margin={top:20,right:120,bottom:20,left:90};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const root=d3.hierarchy(data);
d3.tree().size([innerH,innerW])(root);

g.selectAll("path.link").data(root.links()).join("path").attr("class","link")
  .attr("d",d3.linkHorizontal().x(d=>d.y).y(d=>d.x));

const node=g.selectAll("g.node").data(root.descendants()).join("g").attr("class","node")
  .attr("transform",d=>`translate(${d.y},${d.x})`);
node.append("circle").attr("r",5).attr("fill",d=>d.children?"var(--c1)":"var(--c5)");
node.append("text").attr("dy","0.32em").attr("x",d=>d.children?-9:9).attr("text-anchor",d=>d.children?"end":"start").text(d=>d.data.name);
</script>
</body>
</html>
