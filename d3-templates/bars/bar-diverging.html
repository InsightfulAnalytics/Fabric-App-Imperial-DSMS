<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diverging bar · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
.zero{stroke:var(--muted);stroke-width:1}
</style>
</head>
<body>
<div class="card">
  <h1>Diverging bar chart</h1>
  <p class="sub">Budget variance by division · positive (under) / negative (over)</p>
  <svg id="chart" viewBox="0 0 820 440"></svg>
</div>
<script>
const data=[
  {name:"Garrison",   value:-140},
  {name:"Turbolasers",value:40},
  {name:"TIE Ops",    value:-60},
  {name:"Ion Cannon", value:40},
  {name:"Superlaser", value:-10},
  {name:"Detention",  value:55},
].sort((a,b)=>b.value-a.value);

const W=820,H=440,margin={top:16,right:50,bottom:36,left:110};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const m=d3.max(data,d=>Math.abs(d.value));
const x=d3.scaleLinear().domain([-m,m]).nice().range([0,innerW]);
const y=d3.scaleBand().domain(data.map(d=>d.name)).range([0,innerH]).padding(0.25);

g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(7).tickFormat(d=>(d>0?"+":"")+d+"M"));

g.selectAll("rect").data(data).join("rect")
  .attr("x",d=>x(Math.min(0,d.value))).attr("y",d=>y(d.name))
  .attr("width",d=>Math.abs(x(d.value)-x(0))).attr("height",y.bandwidth())
  .attr("fill",d=>d.value>=0?"var(--pos)":"var(--neg)").attr("rx",2);

g.selectAll(".lab").data(data).join("text").attr("class","lab")
  .attr("x",d=>x(0)+(d.value>=0?-8:8)).attr("text-anchor",d=>d.value>=0?"end":"start")
  .attr("y",d=>y(d.name)+y.bandwidth()/2).attr("dy","0.35em")
  .attr("fill","var(--muted)").attr("font-size",11).text(d=>d.name);

g.append("line").attr("class","zero").attr("x1",x(0)).attr("x2",x(0)).attr("y1",0).attr("y2",innerH);
</script>
</body>
</html>
