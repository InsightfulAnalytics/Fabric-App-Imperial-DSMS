<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bar chart · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
.bar:hover{fill:var(--c5)}
</style>
</head>
<body>
<div class="card">
  <h1>Bar chart</h1>
  <p class="sub">Imperial division spend · single-series categorical bars</p>
  <svg id="chart" viewBox="0 0 820 420"></svg>
</div>
<script>
const data = [
  {name:"Garrison",      value:1240},
  {name:"Turbolasers",   value:560},
  {name:"TIE Flight Ops",value:480},
  {name:"Ion Cannon",    value:300},
  {name:"Superlaser",    value:260},
  {name:"Detention",     value:120},
];

const W = 820, H = 420, margin = {top:16,right:20,bottom:48,left:60};
const innerW = W - margin.left - margin.right;
const innerH = H - margin.top - margin.bottom;

const svg = d3.select("#chart");
const g = svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const x = d3.scaleBand().domain(data.map(d=>d.name)).range([0,innerW]).padding(0.22);
const y = d3.scaleLinear().domain([0, d3.max(data,d=>d.value)]).nice().range([innerH,0]);

g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x));
g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d=>d+"M"));

g.selectAll("rect").data(data).join("rect")
  .attr("class","bar")
  .attr("x",d=>x(d.name)).attr("y",d=>y(d.value))
  .attr("width",x.bandwidth()).attr("height",d=>innerH-y(d.value))
  .attr("fill","var(--c1)").attr("rx",2);
</script>
</body>
</html>
