<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Horizontal bar · D3</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;
--c1:#3b82f6;--c2:#1f4e8c;--c3:#60a5fa;--c4:#93c5fd;--c5:#ffc20e;--c6:#f59e0b;--pos:#1e7c36;--neg:#c62f2f;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:15px;font-weight:600;margin:0 0 2px}
p.sub{color:var(--muted);font-size:12px;margin:0 0 16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px;width:min(820px,96vw)}
svg{width:100%;height:auto;display:block}
.tick text{fill:var(--muted);font-size:11px}
.domain,.tick line{stroke:var(--line)}
.val{fill:var(--text);font-size:11px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="card">
  <h1>Horizontal bar chart</h1>
  <p class="sub">Top vendors by spend · ranked horizontal bars</p>
  <svg id="chart" viewBox="0 0 820 420"></svg>
</div>
<script>
const data = [
  {name:"Kuat Drive Yards", value:920},
  {name:"Sienar Fleet Sys", value:740},
  {name:"Imperial Munitions",value:610},
  {name:"BlasTech",         value:430},
  {name:"Merr-Sonn",        value:290},
  {name:"Arakyd Industries",value:180},
].sort((a,b)=>b.value-a.value);

const W=820,H=420,margin={top:16,right:60,bottom:36,left:140};
const innerW=W-margin.left-margin.right, innerH=H-margin.top-margin.bottom;
const svg=d3.select("#chart");
const g=svg.append("g").attr("transform",`translate(${margin.left},${margin.top})`);

const y=d3.scaleBand().domain(data.map(d=>d.name)).range([0,innerH]).padding(0.22);
const x=d3.scaleLinear().domain([0,d3.max(data,d=>d.value)]).nice().range([0,innerW]);

g.append("g").call(d3.axisLeft(y));
g.append("g").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(5).tickFormat(d=>d+"M"));

g.selectAll("rect").data(data).join("rect")
  .attr("y",d=>y(d.name)).attr("x",0)
  .attr("height",y.bandwidth()).attr("width",d=>x(d.value))
  .attr("fill","var(--c1)").attr("rx",2);

g.selectAll(".val").data(data).join("text")
  .attr("class","val").attr("x",d=>x(d.value)+6)
  .attr("y",d=>y(d.name)+y.bandwidth()/2).attr("dy","0.35em")
  .text(d=>d.value+"M");
</script>
</body>
</html>
