<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/tokens/colors.css">
  <link rel="stylesheet" href="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/tokens/typography.css">
  <link rel="stylesheet" href="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/tokens/effects.css">
  <link rel="stylesheet" href="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/styles.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
  <script src="_ds/dsms-design-system-197d7752-d74e-487e-87a4-ac40e1404735/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; height: 100%; background: var(--ds-bg-void); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--ds-bg-void); }
    ::-webkit-scrollbar-thumb { background: var(--ds-line-conduit); border-radius: 6px; border: 2px solid var(--ds-bg-void); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ds-line-bright); }
    @media (max-width: 1120px) { .briefing-balance-grid { grid-template-columns: 1fr !important; } }
  </style>
</helmet>
<x-import
  component="Console"
  from="./app/Console.jsx"
  start-page="{{ startPage }}"
  dense="{{ dense }}"
  show-combat="{{ showCombat }}"
  collapsed="{{ collapsed }}"
  hint-size="100%,100%"
  style="display:block;width:100%;height:100vh">
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },
  &quot;startPage&quot;: {
    &quot;editor&quot;: &quot;enum&quot;,
    &quot;options&quot;: [&quot;overview&quot;, &quot;briefing&quot;, &quot;ops&quot;, &quot;budget&quot;, &quot;supply&quot;, &quot;workforce&quot;, &quot;maint&quot;],
    &quot;default&quot;: &quot;overview&quot;,
    &quot;tsType&quot;: &quot;string&quot;
  },
  &quot;dense&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; },
  &quot;showCombat&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },
  &quot;collapsed&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    return {
      startPage: p.startPage ?? "overview",
      dense: p.dense ?? false,
      showCombat: p.showCombat ?? true,
      collapsed: p.collapsed ?? false,
    };
  }
}
</script>
</body>
</html>
